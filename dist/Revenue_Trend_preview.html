<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>Revenue Trend</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:'Microsoft YaHei',sans-serif}
.chart-container{width:800px;height:450px;background:#fff;border-radius:12px;padding:20px;box-shadow:0 8px 32px rgba(0,0,0,0.3)}
.chart-title{font-size:18px;font-weight:600;color:#333;margin-bottom:12px;text-align:center}
#chart{width:100%;height:390px}
.controls{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);display:flex;gap:12px}
.controls a{padding:8px 20px;border-radius:20px;background:#4369e8;color:#fff;text-decoration:none;font-size:13px}
</style>
</head>
<body>
<div class="chart-container">
<div class="chart-title">Revenue Trend</div>
<div id="chart"></div>
</div>
<div class="controls">
<a href="#" onclick="var c=document.getElementById('chart');c.style.width=parseInt(c.style.width||'800')*1.2+'px';c.resize()">放大</a>
<a href="#" onclick="var c=document.getElementById('chart');c.style.width='100%';c.resize()">重置</a>
</div>
<script>
var chart = echarts.init(document.getElementById('chart'));
chart.setOption({"title": {"text": "Monthly Revenue (2026 Q1)"}, "tooltip": {"trigger": "axis"}, "legend": {"data": ["Product A", "Product B", "Product C"]}, "xAxis": {"type": "category", "data": ["January", "February", "March"]}, "yAxis": {"type": "value"}, "series": [{"name": "Product A", "type": "line", "data": [320, 410, 380], "smooth": true}, {"name": "Product B", "type": "line", "data": [240, 300, 420], "smooth": true}, {"name": "Product C", "type": "bar", "data": [180, 220, 290]}]});
window.addEventListener('resize', function() { chart.resize() });
</script>
</body>
</html>
